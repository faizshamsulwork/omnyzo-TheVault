<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnyzo Agency Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* CSS Variables - Default Dark Mode */
        :root {
            --bg-main: #0f1115;
            --bg-sidebar: #161920;
            --bg-card: #1f232c;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #2d3748;
        }

        /* Light Mode Variables */
        [data-theme="light"] {
            --bg-main: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 24px; font-weight: 700; margin-bottom: 40px; color: var(--text-main); letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        .nav-item { padding: 12px 16px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background-color: var(--accent); color: #fff; }
        .spacer { flex-grow: 1; }
        
        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .topbar { height: 70px; border-bottom: 1px solid var(--border); background-color: var(--bg-sidebar); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .page-title { font-size: 20px; font-weight: 600; }
        
        /* Theme Toggle Button */
        .theme-toggle { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .theme-toggle:hover { border-color: var(--accent); }

        /* Content Area */
        .content-area { padding: 30px; display: none; }
        .content-area.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & Iframes */
        .card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 20px; }
        .iframe-container { width: 100%; height: 65vh; border: none; border-radius: 8px; background-color: #fff; } /* White bg for sheets visibility */

        /* Form Elements for Invoice */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        .form-control { width: 100%; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border); background-color: var(--bg-main); color: var(--text-main); }
        .form-control:focus { outline: none; border-color: var(--accent); }
        .btn-primary { background-color: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .form-row { display: flex; gap: 20px; }
        .form-row .form-group { flex: 1; }
    </style>
</head>
<body data-theme="dark">

    <div class="sidebar">
        <div class="logo">OMNYZO<span>.</span></div>
        <div class="nav-item active" onclick="switchTab('dashboard')"><i class="fas fa-home"></i> Main Dashboard</div>
        <div class="nav-item" onclick="switchTab('customers')"><i class="fas fa-users"></i> Customers</div>
        <div class="nav-item" onclick="switchTab('cashflow')"><i class="fas fa-chart-line"></i> Cashflow</div>
        <div class="nav-item" onclick="switchTab('invoice')"><i class="fas fa-file-invoice-dollar"></i> New Invoice</div>
        <div class="spacer"></div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div class="page-title" id="topbar-title">Main Dashboard</div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon" id="theme-icon"></i> <span id="theme-text">Dark Mode</span>
            </button>
        </div>

        <div id="dashboard" class="content-area active">
            <div class="card">
                <h2>Welcome to Omnyzo Portal</h2>
                <p style="color: var(--text-muted); margin-top: 10px;">Select a tab on the left to view your synchronized agency data.</p>
            </div>
            </div>

        <div id="customers" class="content-area">
            <div class="card">
                <h3 style="margin-bottom: 15px;">Customer Database</h3>
                <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 14px;">Synced via Google Sheets.</p>
                <iframe class="iframe-container" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-xxxxxxxxxxxx/pubhtml?widget=true&amp;headers=false"></iframe>
            </div>
        </div>

        <div id="cashflow" class="content-area">
            <div class="card">
                <h3 style="margin-bottom: 15px;">Agency Cashflow</h3>
                <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 14px;">Synced via Google Sheets.</p>
                <iframe class="iframe-container" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-yyyyyyyyyyyy/pubhtml?widget=true&amp;headers=false"></iframe>
            </div>
        </div>

        <div id="invoice" class="content-area">
            <div class="card" style="max-width: 800px;">
                <h3 style="margin-bottom: 20px;">Generate New Invoice</h3>
                <form id="invoiceForm">
                    <div class="form-group">
                        <label>Client Name</label>
                        <input type="text" class="form-control" placeholder="e.g. Cagamas / Mind Bloomy">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Invoice Date</label>
                            <input type="date" class="form-control" id="invoiceDate" onchange="calculateDueDate()">
                        </div>
                        <div class="form-group">
                            <label>Credit Term (Days)</label>
                            <select class="form-control" id="creditTerm" onchange="calculateDueDate()">
                                <option value="0">Due on Receipt (0 days)</option>
                                <option value="14">14 Days</option>
                                <option value="30">30 Days</option>
                                <option value="60">60 Days</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Due Date (Auto-calculated)</label>
                            <input type="date" class="form-control" id="dueDate" readonly style="background-color: var(--bg-sidebar);">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Project Description</label>
                        <textarea class="form-control" rows="3" placeholder="Description of services..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Amount (RM)</label>
                        <input type="number" class="form-control" placeholder="0.00">
                    </div>

                    <button type="button" class="btn-primary" onclick="alert('In a fully free system, link this button to a Google Form hidden iframe or generate a PDF using a JS library like jsPDF.')"><i class="fas fa-save"></i> Save & Generate Invoice</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // Tab Switching Logic
        function switchTab(tabId) {
            document.querySelectorAll('.content-area').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            // Update Topbar Title
            const titles = {
                'dashboard': 'Main Dashboard',
                'customers': 'Customer Management',
                'cashflow': 'Cashflow Dashboard',
                'invoice': 'Create New Invoice'
            };
            document.getElementById('topbar-title').innerText = titles[tabId];
        }

        // Dark/Light Mode Toggle Logic
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
                text.innerText = 'Light Mode';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-moon';
                text.innerText = 'Dark Mode';
            }
        }

        // Auto-calculate Due Date based on Credit Term
        function calculateDueDate() {
            const dateStr = document.getElementById('invoiceDate').value;
            const termDays = parseInt(document.getElementById('creditTerm').value);
            
            if (dateStr && !isNaN(termDays)) {
                const invoiceDate = new Date(dateStr);
                invoiceDate.setDate(invoiceDate.getDate() + termDays);
                
                // Format back to YYYY-MM-DD for the input field
                const year = invoiceDate.getFullYear();
                const month = String(invoiceDate.getMonth() + 1).padStart(2, '0');
                const day = String(invoiceDate.getDate()).padStart(2, '0');
                
                document.getElementById('dueDate').value = `${year}-${month}-${day}`;
            }
        }
    </script>
</body>
</html>
